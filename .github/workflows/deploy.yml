name: Build and deploy
on:
  push:
    branches: [master]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Copy files
        run: |
          mkdir -p dist/Larp
          cp plugins/Larp/index.js dist/Larp/index.js
          cp plugins/Larp/manifest.json dist/Larp/manifest.json
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
